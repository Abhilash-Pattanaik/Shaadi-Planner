<style>
:root {
  --gold:#7C3AED;--gold-l:#EDE9FE;--gold-d:#5B21B6;
  --text:#1E1B2E;--text2:#4C4570;--text3:#9B8EC4;
  --bg:#F8F7FF;--sur:#FFFFFF;--sur2:#F0EEFF;--sur3:#E8E4FF;
  --bor:rgba(124,58,237,0.12);
  --red:#C026D3;--red-l:#FDF4FF;
  --green:#7C3AED;--green-l:#EDE9FE;
  --blue:#A855F7;--blue-l:#F3E8FF;
  --violet:#6D28D9;--lilac:#C4B5FD;--purple:#8B5CF6;
  --r:14px;--rs:8px;--sh:0 2px 16px rgba(124,58,237,0.12);
}
html[data-theme="dark"]{
  --gold:#A78BFA;--gold-l:#2E1065;--gold-d:#DDD6FE;
  --text:#EDE9FE;--text2:#C4B5FD;--text3:#7C6FAE;
  --bg:#0F0A1E;--sur:#1A1030;--sur2:#241840;--sur3:#2E2050;
  --bor:rgba(167,139,250,0.15);
  --red:#E879F9;--red-l:#2D0A35;
  --green:#A78BFA;--green-l:#2E1065;
  --blue:#C084FC;--blue-l:#1A0A2E;
  --sh:0 2px 16px rgba(0,0,0,0.4);
}
@media(prefers-color-scheme:dark){html:not([data-theme="light"]){
  --gold:#A78BFA;--gold-l:#2E1065;--gold-d:#DDD6FE;
  --text:#EDE9FE;--text2:#C4B5FD;--text3:#7C6FAE;
  --bg:#0F0A1E;--sur:#1A1030;--sur2:#241840;--sur3:#2E2050;
  --bor:rgba(167,139,250,0.15);
  --red:#E879F9;--red-l:#2D0A35;
  --green:#A78BFA;--green-l:#2E1065;
  --blue:#C084FC;--blue-l:#1A0A2E;
  --sh:0 2px 16px rgba(0,0,0,0.4);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;}
.serif{font-family:'Playfair Display',serif;}
/* Header */
.hdr{background:var(--sur);padding:12px 16px 10px;border-bottom:0.5px solid var(--bor);position:sticky;top:0;z-index:100;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;}
.hdr-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);}
.hdr-act{display:flex;gap:8px;}
.icon-btn{background:var(--sur2);border:0.5px solid var(--bor);border-radius:var(--rs);width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;user-select:none;}
.cd-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.cd-pill{background:var(--gold-l);color:var(--gold-d);font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;}
/* Tabs */
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--sur);border-top:0.5px solid var(--bor);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0);}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 0 7px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:9px;font-family:'DM Sans',sans-serif;transition:color 0.2s;}
.tb.active{color:var(--gold);}
.ti{font-size:18px;margin-bottom:3px;line-height:1;}
/* Pages */
.pg{padding:14px 14px 88px;display:none;}
.pg.active{display:block;}
/* Cards */
.card{background:var(--sur);border-radius:var(--r);border:0.5px solid var(--bor);padding:14px;margin-bottom:10px;}
.card-t{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:8px;}
.big-n{font-family:'Playfair Display',serif;font-size:28px;font-weight:500;}
.pb{height:8px;background:var(--sur2);border-radius:4px;overflow:hidden;margin:10px 0 5px;}
.pf{height:100%;border-radius:4px;transition:width 0.6s;}
.pl{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.sc{background:var(--sur2);border-radius:var(--rs);padding:12px 14px;}
.sl{font-size:11px;color:var(--text3);margin-bottom:4px;}

/* Guest list */

.guest-item:last-child{border-bottom:none;}
.guest-avatar{width:34px;height:34px;border-radius:50%;background:var(--sur2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--gold);flex-shrink:0;border:0.5px solid var(--bor);}
.guest-info{flex:1;min-width:0;}
.guest-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.search-bar{width:100%;padding:9px 12px;background:var(--sur2);border:0.5px solid var(--bor);border-radius:var(--rs);font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;margin-bottom:10px;}

/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:500;}

.badge.o{background:var(--gold-l);color:var(--gold-d);}
.badge.b{background:var(--blue-l);color:var(--blue);}
.badge.gr{background:var(--sur2);color:var(--text3);}
/* Buttons */
.btn{width:100%;padding:12px;background:var(--gold);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;}
.btn:active{opacity:0.85;}
.btn.sec{background:var(--sur2);color:var(--text2);border:0.5px solid var(--bor);margin-top:8px;}
.btn-sm{padding:6px 12px;background:var(--gold);color:#fff;border:none;border-radius:var(--rs);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.btn-sm.sec{background:var(--sur2);color:var(--text2);border:0.5px solid var(--bor);}
.btn-ic{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:4px;}
.btn-ic:active{color:var(--red);}
/* FAB */
.fab{position:fixed;bottom:78px;right:18px;width:50px;height:50px;border-radius:50%;background:var(--gold);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--sh);font-size:24px;color:#fff;z-index:90;transition:transform 0.2s;}
.fab:active{transform:scale(0.92);}
/* Modal */
.mbd{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.mbd.open{display:flex;}
.modal{background:var(--sur);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:18px 18px calc(18px + env(safe-area-inset-bottom,0));max-height:92vh;overflow-y:auto;}
.m-handle{width:36px;height:4px;background:var(--bor);border-radius:2px;margin:0 auto 14px;}
.m-title{font-family:'Playfair Display',serif;font-size:19px;margin-bottom:14px;}
/* Forms */
.fg{margin-bottom:12px;}
.fl{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;display:block;}
.fi{width:100%;padding:10px 12px;background:var(--sur2);border:0.5px solid var(--bor);border-radius:var(--rs);font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;}
.fi:focus{border-color:var(--gold);}
select.fi{appearance:none;cursor:pointer;}
.fi::placeholder{color:var(--text3);}
/* Tasks */
.task-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--bor);}
.task-item:last-child{border-bottom:none;}
.task-cb{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--bor);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;font-size:11px;transition:all 0.15s;}

.task-info{flex:1;min-width:0;}
.task-title{font-size:13px;font-weight:500;}

/* Vendors */

.vendor-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.vendor-name{font-size:15px;font-weight:500;}
.vendor-cat{font-size:12px;color:var(--text3);margin-top:2px;}
.vendor-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:10px;}

.vendor-actions{display:flex;gap:8px;}

.set-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--bor);gap:10px;}
.set-row:last-child{border-bottom:none;}
.set-info{flex:1;}
.set-t{font-size:14px;font-weight:500;}
.set-d{font-size:12px;color:var(--text3);margin-top:2px;}
.theme-toggle{display:flex;gap:4px;}
.theme-opt{padding:5px 10px;border-radius:var(--rs);border:0.5px solid var(--bor);background:var(--sur2);color:var(--text2);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.theme-opt.active{background:var(--gold);color:#fff;border-color:var(--gold);}
.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.exp-card{background:var(--sur2);border-radius:var(--rs);padding:14px;text-align:center;cursor:pointer;border:0.5px solid var(--bor);}
.exp-card:active{border-color:var(--gold);}
.code-b{background:var(--sur2);border-radius:var(--rs);padding:10px 12px;font-family:monospace;font-size:11px;color:var(--text2);margin:8px 0;border-left:2px solid var(--gold);white-space:pre-wrap;word-break:break-all;}
.step{display:flex;gap:10px;padding:5px 0;font-size:13px;color:var(--text2);}
.step-n{width:20px;height:20px;border-radius:50%;background:var(--gold-l);color:var(--gold-d);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0;}
/* Cat chips */
.cat-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.cat-chip{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:20px;background:var(--sur2);border:0.5px solid var(--bor);font-size:13px;}
.cat-chip .del{color:var(--text3);cursor:pointer;margin-left:2px;font-size:12px;}
/* Color picker */
.color-swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.swatch.selected{border-color:var(--text);}
/* Emoji row */
.emoji-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.emoji-opt{width:34px;height:34px;border-radius:var(--rs);background:var(--sur2);border:0.5px solid var(--bor);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;}
.emoji-opt.selected{border-color:var(--gold);background:var(--gold-l);}
/* Chart */
.chart-wrap{position:relative;margin:8px 0;}
.chart-wrap.h200{height:200px;}
.chart-wrap.h180{height:180px;}
.chart-wrap.h160{height:160px;}
.chart-empty{padding:28px 0;text-align:center;font-size:13px;color:var(--text3);border:1px dashed var(--bor);border-radius:var(--rs);margin:4px 0;}
/* Empty */
.empty{text-align:center;padding:32px 20px;color:var(--text3);font-size:14px;}
.empty-ic{font-size:32px;margin-bottom:8px;}
/* Toast */
.toast{position:fixed;bottom:98px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:9px 18px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
/* Goal banner */
.goal-b{background:var(--gold-l);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.goal-b-text{flex:1;font-size:13px;color:var(--gold-d);}
</style>

<body>

    <div class="hdr-title serif">Shaadi Planner 💍</div>
    <div class="hdr-act">
      <div class="icon-btn" id="theme-btn" onclick="cycleTheme()" title="Toggle theme">✨</div>

  <button class="tb" onclick="goTab('vendors')" id="tb-vendors"><div class="ti">🤝</div>Vendors</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
// ── Constants ──────────────────────────────────────────
const SAVINGS_SOURCES = [
  {id:'jupiter', name:'Jupiter',       emoji:'🟣'},
  {id:'fd',      name:'FD',            emoji:'🏦'},
  {id:'mf',      name:'Mutual Fund',   emoji:'📈'},
  {id:'savings', name:'Savings A/C',   emoji:'💳'},
  {id:'cash',    name:'Cash',          emoji:'💵'},
];
function getWeddingDate()    { return new Date(S.weddingDate    || '2026-12-02'); }
function getEngagementDate() { return new Date(S.engagementDate || '2026-07-01'); }
// keep backward-compat references
Object.defineProperty(window,'WEDDING_DATE',    {get:getWeddingDate});
Object.defineProperty(window,'ENGAGEMENT_DATE', {get:getEngagementDate});

const DEFAULT_CATS = [
  {id:'venue',      name:'Venue',           emoji:'🏛️',color:'#7C3AED',custom:false},
  {id:'catering',   name:'Catering',        emoji:'🍽️',color:'#9333EA',custom:false},
  {id:'decoration', name:'Decoration',      emoji:'🌸',color:'#C026D3',custom:false},
  {id:'photo',      name:'Photography',     emoji:'📸',color:'#6D28D9',custom:false},
  {id:'clothes',    name:'Clothes',         emoji:'👗',color:'#A855F7',custom:false},
  {id:'jewelry',    name:'Jewelry',         emoji:'💎',color:'#7E22CE',custom:false},
  {id:'mehndi',     name:'Mehendi/Sangeet', emoji:'🎶',color:'#8B5CF6',custom:false},
  {id:'engagement', name:'Engagement',      emoji:'💍',color:'#D946EF',custom:false},
  {id:'honeymoon',  name:'Honeymoon',       emoji:'✈️',color:'#6366F1',custom:false},
  {id:'invitation', name:'Invitations',     emoji:'💌',color:'#A78BFA',custom:false},
  {id:'misc',       name:'Miscellaneous',   emoji:'📦',color:'#9B8EC4',custom:false}
];

const VENDOR_STATUSES = [
  {id:'shortlisted',label:'Shortlisted',cls:'gr'},
  {id:'booked',     label:'Booked',      cls:'b'},
  {id:'advance',    label:'Advance Paid',cls:'o'},
  {id:'paid',       label:'Fully Paid',  cls:'g'},
  {id:'cancelled',  label:'Cancelled',   cls:'r'}
];

const TASK_CATS = ['Venue','Catering','Attire','Ceremony','Photography','Invitations','Beauty','Travel','Finance','Other'];

const SWATCH_COLORS = ['#7C3AED','#9333EA','#A855F7','#6D28D9','#C026D3','#D946EF','#6366F1','#8B5CF6','#A78BFA','#9B8EC4'];
const EMOJI_OPTS    = ['🎪','🎭','🎨','🎵','🚗','🏡','💐','🍰','🥂','💡','📷','🎁','🛍️','💻','🏋️'];

const DEFAULT_TASKS = [
  {title:'Book wedding venue',     category:'Venue',       event:'wedding',    dueDate:'',done:false},
  {title:'Book caterer',           category:'Catering',    event:'wedding',    dueDate:'',done:false},
  {title:'Book photographer',      category:'Photography', event:'wedding',    dueDate:'',done:false},
  {title:'Order wedding invitations',category:'Invitations',event:'wedding',   dueDate:'2026-11-01',done:false},
  {title:'Book engagement venue',  category:'Venue',       event:'engagement', dueDate:'',done:false},
  {title:'Bridal outfit shopping', category:'Attire',      event:'wedding',    dueDate:'',done:false},
  {title:'Book makeup artist',     category:'Beauty',      event:'wedding',    dueDate:'',done:false},
  {title:'Plan honeymoon',         category:'Travel',      event:'wedding',    dueDate:'',done:false},
  {title:'Set savings goal',       category:'Finance',     event:'wedding',    dueDate:'',done:false},
];

// ── State ──────────────────────────────────────────────
let S = {
  goal:0, engGoal:0,
  weddingDate:'2026-12-02', engagementDate:'2026-07-01',
  savings:[], expenses:[], vendors:[], tasks:[], guests:[],
  customCats:[],
  sheetsUrl:'', lastSync:null,
  theme:'auto'
};

// ── Storage (localStorage — works in any browser) ──────
async function loadS() {
  try {
    const r = localStorage.getItem('shaadi_v3');
    if(r) {
      const parsed = JSON.parse(r);
      S = {...S, ...parsed};
      // Always ensure numeric types
      S.goal    = Number(S.goal)    || 0;
      S.engGoal = Number(S.engGoal) || 0;
    }
  } catch(e) { console.warn('loadS error:', e); }
}
async function saveS() {
  try {
    // Ensure goal is stored as number before saving
    S.goal    = Number(S.goal)    || 0;
    S.engGoal = Number(S.engGoal) || 0;
    localStorage.setItem('shaadi_v3', JSON.stringify(S));
  } catch(e) { console.warn('saveS error:', e); }
}

// ── Helpers ────────────────────────────────────────────
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
function allCats() { return [...DEFAULT_CATS,...S.customCats]; }
function getCat(id) { return allCats().find(c=>c.id===id)||DEFAULT_CATS[DEFAULT_CATS.length-1]; }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function daysLeft(d) { return Math.max(0,Math.ceil((d-new Date())/86400000)); }
function fmtDate(d) {
  if(!d) return '';
  const dt=new Date(d);
  if(isNaN(dt.getTime())) return '';
  return dt.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
}
function cleanMonth(m) {
  if(!m) return '';
  if(/^[A-Za-z]+ \d{4}$/.test(String(m).trim())) return String(m).trim();
  const dt=new Date(m);
  if(!isNaN(dt.getTime())) return MONTHS[dt.getMonth()]+' '+dt.getFullYear();
  return String(m);
}
function fmt(n) { return '₹'+Math.round(n).toLocaleString('en-IN'); }

function showToast(msg,ms=2500) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),ms);
}

// ── Theme ──────────────────────────────────────────────
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme',t||'auto');
  const icons={light:'☀️',dark:'🌙',auto:'✨'};
  document.getElementById('theme-btn').textContent = icons[t||'auto'];
}
function cycleTheme() {
  const order=['auto','light','dark'];
  S.theme=order[(order.indexOf(S.theme||'auto')+1)%3];
  applyTheme(S.theme); saveS();
  if(curTab==='settings') renderSettings();
}

// ── Countdowns ─────────────────────────────────────────
function updateCDs() {
  document.getElementById('cd-w').textContent = `💒 Wedding: ${daysLeft(getWeddingDate())} days`;
  document.getElementById('cd-e').textContent = `💍 Engagement: ~${daysLeft(getEngagementDate())} days`;
}

// ── Sync ───────────────────────────────────────────────
let syncStatus='idle';
function updateSyncIcon() {
  const icons={idle:'☁️',syncing:'🔄',synced:'✅',error:'⚠️'};
  document.getElementById('sync-ic').textContent=icons[syncStatus]||'☁️';
}
async function syncToSheets(silent=false) {
  if(!S.sheetsUrl){if(!silent){showToast('⚙️ Set up Sheets URL in Settings');goTab('settings');}return;}
  syncStatus='syncing'; updateSyncIcon();
  if(!silent) showToast('☁️ Syncing...');
  try {
    const payload = JSON.stringify({
      goal:S.goal, engGoal:S.engGoal,
      weddingDate:S.weddingDate, engagementDate:S.engagementDate,
      savings:S.savings, expenses:S.expenses,
      vendors:S.vendors, tasks:S.tasks, guests:S.guests,
      exportedAt:new Date().toISOString()
    });
    // Use no-cors POST with URLSearchParams — works in sandboxed iframes
    const body = new URLSearchParams();
    body.set('data', payload);
    const resp = await fetch(S.sheetsUrl, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: body.toString()
    });
    // no-cors always returns opaque — reaching here means network succeeded
    syncStatus='synced'; S.lastSync=new Date().toISOString(); await saveS();
    if(!silent) showToast('✅ Synced to Google Sheets!');
    if(curTab==='settings') renderSettings();
  } catch(err) {
    // Fallback: open URL in hidden iframe (works even when fetch is blocked)
    try {
      const payload = encodeURIComponent(JSON.stringify({
        goal:S.goal, engGoal:S.engGoal,
        savings:S.savings.slice(-50), expenses:S.expenses.slice(-100),
        exportedAt:new Date().toISOString()
      }));
      const url = S.sheetsUrl + '?data=' + payload;
      const ifr = document.createElement('iframe');
      ifr.style.display='none'; ifr.src=url;
      document.body.appendChild(ifr);
      setTimeout(()=>{ try{document.body.removeChild(ifr);}catch(e){} }, 5000);
      syncStatus='synced'; S.lastSync=new Date().toISOString(); await saveS();
      if(!silent) showToast('✅ Synced! Verify in your Sheet.');
      if(curTab==='settings') renderSettings();
    } catch(err2) {
      syncStatus='error';
      if(!silent) showToast('❌ Sync blocked by browser. Download CSV instead.');
    }
  }
  updateSyncIcon();
}
async function manualSync() { if(!S.sheetsUrl){goTab('settings');return;} await syncToSheets(); }

async function pullFromSheets(silent=false) {
  if(!S.sheetsUrl){showToast('⚙️ Set up Sheets URL in Settings');goTab('settings');return;}
  if(!silent) showToast('☁️ Pulling data from Sheets...');
  try {
    const url = S.sheetsUrl + '?action=pull';
    const resp = await fetch(url);
    if(!resp.ok) throw new Error('fetch failed');
    const data = await resp.json();
    if(!data || (!data.savings && !data.expenses)) throw new Error('empty');

    // Merge — sheet is source of truth
    if(data.savings)  S.savings  = data.savings.map(s=>({...s, month: cleanMonth(s.month)}));
    if(data.expenses) S.expenses = data.expenses;
    if(data.vendors)  S.vendors  = data.vendors;
    if(data.tasks)    S.tasks    = data.tasks;
    if(data.guests)   S.guests   = data.guests;
    if(data.goal)     S.goal     = data.goal;
    if(data.engGoal)  S.engGoal  = data.engGoal;

    await saveS();
    if(!silent) showToast('✅ Data pulled from Google Sheets!');
    renderTab();
    if(curTab==='settings') renderSettings();
  } catch(e) {
    if(!silent) showToast('❌ Pull failed. Check Apps Script code.');
  }
}

// ── Export ─────────────────────────────────────────────
function exportCSV(type) {
  let csv='',fn='';
  if(type==='savings'){
    csv='Month,Amount (INR),Note,Date\n';
    S.savings.forEach(s=>{csv+=`"${s.month||''}",${s.amount},"${s.note||''}","${fmtDate(s.date)}"\n`;});
    fn='shaadi_savings.csv';
  } else if(type==='expenses'){
    csv='Category,Amount (INR),Description,Event,Date\n';
    S.expenses.forEach(e=>{csv+=`"${getCat(e.category).name}",${e.amount},"${e.description||''}","${e.event||'wedding'}","${fmtDate(e.date)}"\n`;});
    fn='shaadi_expenses.csv';
  } else if(type==='vendors'){
    csv='Name,Phone,Category,Total Amount,Paid Amount,Status,Notes\n';
    S.vendors.forEach(v=>{csv+=`"${v.name}","${v.phone||''}","${getCat(v.category).name}",${v.totalAmount||0},${v.paidAmount||0},"${v.status}","${v.notes||''}"\n`;});
    fn='shaadi_vendors.csv';
  } else if(type==='tasks'){
    csv='Task,Category,Event,Due Date,Done\n';
    S.tasks.forEach(t=>{csv+=`"${t.title}","${t.category}","${t.event}","${t.dueDate||''}","${t.done?'Yes':'No'}"\n`;});
    fn='shaadi_tasks.csv';
  } else if(type==='guests'){
    csv='Name,Event,No. of People,Invite Sent\n';
    S.guests.forEach(g=>{csv+=`"${g.name}","${g.event}",${g.count||1},"${g.invited?'Yes':'No'}"\n`;});
    fn='shaadi_guests.csv';
  } else {
    csv='Type,Details,Amount,Date\n';
    S.savings.forEach(s=>{csv+=`"Savings","${s.month||''}",${s.amount},"${fmtDate(s.date)}"\n`;});
    S.expenses.forEach(e=>{csv+=`"Expense","${getCat(e.category).name} - ${e.description||''}",${e.amount},"${fmtDate(e.date)}"\n`;});
    fn='shaadi_all.csv';
  }
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=fn; a.click(); showToast('📥 Downloaded!');
}
function exportJSON() {
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(S,null,2)],{type:'application/json'}));
  a.download='shaadi_backup.json'; a.click(); showToast('📦 Backup downloaded!');
}

let curTab='home';
function goTab(tab) {
  curTab=tab;
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));

// ── Charts ─────────────────────────────────────────────
const charts={};
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function getCSSVar(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}

function renderPieChart(canvasId,labels,data,colors){
  destroyChart(canvasId);
  const ctx=document.getElementById(canvasId); if(!ctx||!data.length) return;
  charts[canvasId]=new Chart(ctx,{
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:getCSSVar('--sur')||'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'65%',
      plugins:{legend:{position:'right',labels:{font:{size:10,family:'DM Sans'},color:getCSSVar('--text')||'#222',boxWidth:10,padding:8}}}}
  });
}
function renderBarChart(canvasId,labels,data){
  destroyChart(canvasId);
  const ctx=document.getElementById(canvasId); if(!ctx) return;
  const gold=getCSSVar('--gold')||'#8B5CF6';
  const tc=getCSSVar('--text2')||'#555';
  charts[canvasId]=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[{data,backgroundColor:gold+'88',borderColor:gold,borderWidth:1,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{display:false},ticks:{font:{size:10},color:tc}},
        y:{grid:{color:getCSSVar('--bor')},ticks:{font:{size:10},color:tc,callback:v=>'₹'+Math.round(v/1000)+'k'}}
      }}
  });
}

// ── Charts helpers ────────────────────────────────────
function renderLineChart(canvasId, labels, datasets) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId); if (!ctx) return;
  const tc = getCSSVar('--text2') || '#555';
  charts[canvasId] = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { font: { size: 10, family: 'DM Sans' }, color: tc, boxWidth: 10 } } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 }, color: tc } },
        y: { grid: { color: getCSSVar('--bor') }, ticks: { font: { size: 10 }, color: tc, callback: v => '₹' + Math.round(v / 1000) + 'k' } }
      }
    }
  });
}
function renderHBarChart(canvasId, labels, data, colors) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId); if (!ctx) return;
  const tc = getCSSVar('--text2') || '#555';
  charts[canvasId] = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderRadius: 4, borderSkipped: false }] },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: getCSSVar('--bor') }, ticks: { font: { size: 10 }, color: tc, callback: v => '₹' + Math.round(v / 1000) + 'k' } },
        y: { grid: { display: false }, ticks: { font: { size: 11 }, color: tc } }
      }
    }
  });
}

// ── Home / Dashboard ───────────────────────────────────
function renderHome() {
  const wd = getWeddingDate(), ed = getEngagementDate();
  const totalSaved = S.savings.reduce((a, x) => a + x.amount, 0);
  const wExp = S.expenses.filter(e => e.event !== 'engagement');
  const eExp = S.expenses.filter(e => e.event === 'engagement');
  const wSpent = wExp.reduce((a, x) => a + x.amount, 0);
  const eSpent = eExp.reduce((a, x) => a + x.amount, 0);
  const totalSpent = wSpent + eSpent;
  const balance = totalSaved - totalSpent;
  const goal    = Number(S.goal)    || 0;
  const engGoal = Number(S.engGoal) || 0;
  const progress = goal > 0 ? Math.min(100, (totalSaved / goal) * 100) : 0;
  const spendPct  = goal > 0 ? Math.min(100, (totalSpent / goal) * 100) : 0;

  // ① Expense by Category — donut
  const catTotals = {};
  S.expenses.forEach(e => { catTotals[e.category] = (catTotals[e.category] || 0) + e.amount; });
  const catE = Object.entries(catTotals).sort((a, b) => b[1] - a[1]).slice(0, 7);
  const pieLabels = catE.map(([id]) => getCat(id).emoji + ' ' + getCat(id).name);
  const pieData   = catE.map(([, v]) => v);
  const pieColors = catE.map(([id]) => getCat(id).color);

  // ② Monthly savings — bar
  const mMap = {};
  S.savings.forEach(s => { const m = cleanMonth(s.month) || fmtDate(s.date); mMap[m] = (mMap[m] || 0) + s.amount; });
  const mE = Object.entries(mMap).slice(-8);
  const barLabels = mE.map(([k]) => k.split(' ')[0].slice(0, 3));
  const barData   = mE.map(([, v]) => v);

  // ③ Savings by source — donut
  const srcTotals = {};
  S.savings.forEach(s => { const src = s.source || 'savings'; srcTotals[src] = (srcTotals[src] || 0) + s.amount; });
  const srcE = Object.entries(srcTotals);
  const srcLabels = srcE.map(([id]) => { const s = SAVINGS_SOURCES.find(x => x.id === id); return s ? s.emoji + ' ' + s.name : id; });
  const srcData   = srcE.map(([, v]) => v);
  const srcColors = ['#7C3AED','#A855F7','#6D28D9','#C026D3','#9333EA'];

  // ④ Cumulative Savings vs Spending — line
  const allDates = [...S.savings.map(s => ({ d: s.date, v: s.amount, t: 'save' })),
                    ...S.expenses.map(e => ({ d: e.date, v: e.amount, t: 'spend' }))]
    .sort((a, b) => new Date(a.d) - new Date(b.d));
  let cumSave = 0, cumSpend = 0;
  const lineLabels = [], lineSave = [], lineSpend = [];
  allDates.forEach(item => {
    if (item.t === 'save') cumSave += item.v; else cumSpend += item.v;
    const lbl = fmtDate(item.d).split(' ').slice(0, 2).join(' ');
    lineLabels.push(lbl); lineSave.push(cumSave); lineSpend.push(cumSpend);
  });
  const gold  = '#8B5CF6', red = '#C026D3';
  const lineDs = [
    { label: 'Cumulative Savings', data: lineSave,  borderColor: gold, backgroundColor: gold + '22', fill: true, tension: 0.4, pointRadius: 2 },
    { label: 'Cumulative Spend',   data: lineSpend, borderColor: red,  backgroundColor: red  + '11', fill: true, tension: 0.4, pointRadius: 2 }
  ];

  // ⑤ Wedding vs Engagement spend — horizontal bar
  const evtLabels  = ['💒 Wedding', '💍 Engagement'];
  const evtData    = [wSpent, eSpent];
  const evtColors  = ['#8B5CF688', '#C026D388'];

  // Recent
  const recent = [...S.savings.map(s => ({ ...s, _type: 's' })), ...S.expenses.map(e => ({ ...e, _type: 'e' }))]
    .sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
  const recentHTML = recent.map(item => {
    if (item._type === 's') {
      const src = SAVINGS_SOURCES.find(x => x.id === (item.source || 'savings'));

    }
    const cat = getCat(item.category);
    return `<div class="li"><div class="li-icon" style="background:${cat.color}22">${cat.emoji}</div><div class="li-info"><div class="li-title">${item.description || cat.name}</div><div class="li-sub">${cat.name}${item.event === 'engagement' ? ' · Engagement' : ''} · ${fmtDate(item.date)}</div></div><div class="li-amt r">-${fmt(item.amount)}</div></div>`;
  }).join('');

  const tasksDone  = S.tasks.filter(t => t.done).length;
  const tasksTotal = S.tasks.length;

  document.getElementById('pg-home').innerHTML = `
    ${!goal ? `<div class="goal-b"><div style="font-size:22px">🎯</div><div class="goal-b-text"><strong>Set your wedding budget</strong><br>Track your savings progress</div><button class="btn-sm" onclick="openGoalModal()">Set Budget</button></div>` : ''}
    <div class="card">
      <div class="card-t">Total Savings</div>
      <div class="big-n serif">${fmt(totalSaved)}</div>
      ${goal ? `<div class="pb"><div class="pf" style="width:${progress.toFixed(0)}%;background:var(--gold)"></div></div><div class="pl"><span>${progress.toFixed(0)}% of goal</span><span>Goal: ${fmt(goal)}</span></div>` : ''}
    </div>

      <div class="sc"><div class="sl">Net Balance</div><div class="sv ${balance >= 0 ? 'g' : 'r'}">${fmt(balance)}</div></div>
      <div class="sc"><div class="sl">Total Spent</div><div class="sv r">${fmt(totalSpent)}</div></div>
      <div class="sc"><div class="sl">Wedding Spend</div><div class="sv r">${fmt(wSpent)}</div></div>
      <div class="sc"><div class="sl">Engagement Spend</div><div class="sv o">${fmt(eSpent)}</div></div>
    </div>
    ${engGoal ? `<div class="card" style="border-color:var(--gold)">
      <div class="card-t" style="color:var(--gold-d)">💍 Engagement Budget</div>
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <div class="big-n serif" style="font-size:22px">${fmt(eSpent)}</div>
        <div style="font-size:12px;color:var(--text3)">of ${fmt(engGoal)}</div>
      </div>
      <div class="pb"><div class="pf" style="width:${Math.min(100, (eSpent / engGoal) * 100).toFixed(0)}%;background:var(--gold)"></div></div>
      <div class="pl"><span>${Math.min(100, (eSpent / engGoal) * 100).toFixed(0)}% used</span><span>${fmt(engGoal - eSpent)} remaining</span></div>
    </div>` : ''}
    ${goal ? `<div class="card">
      <div class="card-t">Spending vs Budget</div>
      <div class="pb" style="margin-top:4px"><div class="pf" style="width:${spendPct.toFixed(0)}%;background:var(--red)"></div></div>
      <div class="pl" style="margin-top:4px"><span style="color:var(--red)">${fmt(totalSpent)} spent</span><span>${fmt(goal - totalSpent)} remaining</span></div>
    </div>` : ''}
    ${tasksTotal ? `<div class="card" style="display:flex;align-items:center;gap:12px">
      <div style="font-size:28px">✅</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:500">${tasksDone} of ${tasksTotal} tasks done</div>
        <div class="pb" style="margin:6px 0 0"><div class="pf" style="width:${((tasksDone / tasksTotal) * 100).toFixed(0)}%;background:var(--green)"></div></div>
      </div>
      <button class="btn-sm sec" onclick="goTab('tasks')">View</button>
    </div>` : ''}
    <div class="card"><div class="card-t">Savings vs Spending (Cumulative)</div>${lineLabels.length>1?`<div class="chart-wrap h200"><canvas id="line-chart"></canvas></div>`:`<div class="chart-empty">Add savings &amp; expenses to see the trend line</div>`}</div>
    <div class="card"><div class="card-t">Expense by Category</div>${pieData.length?`<div class="chart-wrap h200"><canvas id="pie-chart"></canvas></div>`:`<div class="chart-empty">Add expenses to see category breakdown</div>`}</div>
    <div class="card"><div class="card-t">Savings by Source</div>${srcData.length?`<div class="chart-wrap h180"><canvas id="src-chart"></canvas></div>`:`<div class="chart-empty">Add savings with a source (MF, FD, Jupiter…)</div>`}</div>
    <div class="card"><div class="card-t">Monthly Savings</div>${barData.length?`<div class="chart-wrap h160"><canvas id="bar-chart"></canvas></div>`:`<div class="chart-empty">Add monthly savings to see the bar chart</div>`}</div>
    <div class="card"><div class="card-t">Wedding vs Engagement Spend</div>${(wSpent+eSpent>0)?`<div class="chart-wrap" style="height:90px"><canvas id="evt-chart"></canvas></div>`:`<div class="chart-empty">Add expenses tagged to Wedding or Engagement</div>`}</div>
    ${recent.length ? `<div class="card"><div class="card-t">Recent Activity</div>${recentHTML}</div>` : ''}
    <div class="card" style="text-align:center;padding:14px">
      <div style="font-size:24px">💒</div>
      <div class="serif" style="font-size:15px;margin-top:5px;color:var(--gold)">${wd.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</div>

  requestAnimationFrame(() => {

    if (srcData.length > 1) renderPieChart('src-chart', srcLabels, srcData, srcColors);

    if (wSpent + eSpent > 0) renderHBarChart('evt-chart', evtLabels, evtData, evtColors);
  });
}

let guestEvFilter='wedding', guestSearch='';

function renderGuests() {
  const wGuests=S.guests.filter(g=>g.event==='wedding');
  const eGuests=S.guests.filter(g=>g.event==='engagement');
  const wTotal=wGuests.reduce((a,g)=>a+(g.count||1),0);
  const eTotal=eGuests.reduce((a,g)=>a+(g.count||1),0);
  const wInvited=wGuests.filter(g=>g.invited).reduce((a,g)=>a+(g.count||1),0);
  const eInvited=eGuests.filter(g=>g.invited).reduce((a,g)=>a+(g.count||1),0);

  let list = S.guests.filter(g=>g.event===guestEvFilter);
  if(guestSearch.trim()) list=list.filter(g=>g.name.toLowerCase().includes(guestSearch.toLowerCase()));
  list=[...list].sort((a,b)=>a.name.localeCompare(b.name));

  const total=list.reduce((a,g)=>a+(g.count||1),0);

function doGet(e){
  if(e.parameter.action==='pull'){
    var ss=SpreadsheetApp.getActiveSpreadsheet();

    function sheetToObjects(sheetName,keys){
      var sh=ss.getSheetByName(sheetName);
      if(!sh||sh.getLastRow()<2) return [];
      var rows=sh.getRange(2,1,sh.getLastRow()-1,keys.length).getValues();
      return rows.filter(function(r){return r[0]!=='';}).map(function(r){
        var obj={};
        keys.forEach(function(k,i){obj[k]=r[i]||'';});
        return obj;
      });
    }

    var savings=sheetToObjects('Savings',['month','source','amount','note','date']);
    savings=savings.map(function(r){r.amount=parseFloat(r.amount)||0;r.id=r.id||Date.now().toString(36)+Math.random().toString(36).slice(2,5);return r;});

    var expenses=sheetToObjects('Expenses',['category','amount','description','event','date']);
    expenses=expenses.map(function(r){r.amount=parseFloat(r.amount)||0;r.id=r.id||Date.now().toString(36)+Math.random().toString(36).slice(2,5);return r;});

    var vendors=sheetToObjects('Vendors',['name','category','phone','totalAmount','paidAmount','balance','status','notes']);
    vendors=vendors.map(function(r){r.totalAmount=parseFloat(r.totalAmount)||0;r.paidAmount=parseFloat(r.paidAmount)||0;r.id=r.id||Date.now().toString(36)+Math.random().toString(36).slice(2,5);return r;});

    var tasks=sheetToObjects('Tasks',['title','category','event','dueDate','done']);
    tasks=tasks.map(function(r){r.done=(r.done==='Yes'||r.done===true);r.id=r.id||Date.now().toString(36)+Math.random().toString(36).slice(2,5);return r;});

    var guests=sheetToObjects('Guests',['name','event','count','invited']);
    guests=guests.map(function(r){r.count=parseInt(r.count)||1;r.invited=(r.invited==='Yes'||r.invited===true);r.id=r.id||Date.now().toString(36)+Math.random().toString(36).slice(2,5);return r;});

    var result=JSON.stringify({savings:savings,expenses:expenses,vendors:vendors,tasks:tasks,guests:guests});
    return ContentService.createTextOutput(result).setMimeType(ContentService.MimeType.JSON);
  }
  return ContentService.createTextOutput('ok');
}`;

let _selGuestInvited=false;
function selectGuestEv(ev){
  document.getElementById('g-event').value=ev;
  const map={wedding:'gev-w',engagement:'gev-e',both:'gev-b'};
  Object.entries(map).forEach(([key,id])=>{
    const el=document.getElementById(id);
    if(el) el.classList.toggle('active',key===ev);
  });
}
function selectInvite(val){
  _selGuestInvited=val;
  const gi=document.getElementById('g-invited');
  if(gi) gi.value=val;
  const y=document.getElementById('ginv-y');
  const n=document.getElementById('ginv-n');
  if(y) y.classList.toggle('active',val);
  if(n) n.classList.toggle('active',!val);
}

async function addGuest(){
  const name=document.getElementById('g-name').value.trim();
  const event=document.getElementById('g-event').value;
  const count=parseInt(document.getElementById('g-count').value)||1;
  const invited=document.getElementById('g-invited').value==='true';
  if(!name){showToast('❌ Enter guest name');return;}

  if(event==='both'){
    // Add to both wedding and engagement
    S.guests.push({id:uid(),name,event:'wedding',count,invited});
    S.guests.push({id:uid(),name,event:'engagement',count,invited});
  } else {
    S.guests.push({id:uid(),name,event,count,invited});
  }
  await saveS(); closeM();
  guestEvFilter=event==='both'?'wedding':event;
  renderTab();
  showToast(`✅ ${name} added!`);
  if(S.sheetsUrl) syncToSheets(true);
}

  const srcOpts=SAVINGS_SOURCES.map(s=>`<option value="${s.id}">${s.emoji} ${s.name}</option>`).join('');
  openM(`
    <div class="m-title serif">Add Savings 💰</div>
    <div class="fg"><label class="fl">Month</label><select class="fi" id="s-month">${opts.join('')}</select></div>
    <div class="fg"><label class="fl">Saved In</label><select class="fi" id="s-src">${srcOpts}</select></div>
    <div class="fg"><label class="fl">Amount (₹)</label><input class="fi" type="number" id="s-amt" placeholder="e.g. 15000" inputmode="numeric"></div>
    <div class="fg"><label class="fl">Note (optional)</label><input class="fi" type="text" id="s-note" placeholder="e.g. Salary savings"></div>

}

// ── CRUD ───────────────────────────────────────────────
async function addSaving(){
  const month=document.getElementById('s-month').value;
  const source=document.getElementById('s-src').value;
  const amount=parseFloat(document.getElementById('s-amt').value);
  const note=document.getElementById('s-note').value.trim();
  if(!amount||amount<=0){showToast('❌ Enter a valid amount');return;}
  S.savings.push({id:uid(),date:new Date().toISOString(),month,source,amount,note});
  await saveS(); closeM(); renderTab();
  showToast('✅ Savings added!');
  if(S.sheetsUrl) syncToSheets(true);
}
async function addExpense(){
  const category=document.getElementById('e-cat').value;
  const event=document.getElementById('e-event').value;
  const amount=parseFloat(document.getElementById('e-amt').value);
  const vendorId=document.getElementById('e-vendor').value||'';
  const description=document.getElementById('e-desc').value.trim();
  const date=document.getElementById('e-date').value||new Date().toISOString().split('T')[0];
  if(!amount||amount<=0){showToast('❌ Enter a valid amount');return;}

  // Auto-fill description from vendor name if empty
  let desc=description;
  if(!desc && vendorId){
    const v=S.vendors.find(v=>v.id===vendorId);
    if(v) desc=v.name;
  }

  S.expenses.push({id:uid(),date,category,event,amount,description:desc,vendorId});

  // Update vendor paidAmount if linked
  if(vendorId){
    const v=S.vendors.find(v=>v.id===vendorId);
    if(v){
      v.paidAmount=(v.paidAmount||0)+amount;
      if(v.paidAmount>=(v.totalAmount||0) && v.status!=='paid') v.status='paid';
      else if(v.paidAmount>0 && v.status==='shortlisted') v.status='advance';
    }
  }

  await saveS(); closeM(); renderTab();
  showToast(vendorId?'✅ Expense added & vendor updated!':'✅ Expense added!');
  if(S.sheetsUrl) syncToSheets(true);
}
async function setGoal(){
  const a=parseFloat(document.getElementById('g-amt').value);
  if(!a||a<=0){showToast('❌ Enter a valid amount');return;}
  S.goal = Number(a);
  await saveS(); closeM(); renderTab(); showToast('🎯 Wedding budget set!');
}
async function setEngGoal(){
  const a=parseFloat(document.getElementById('eg-amt').value);
  if(!a||a<=0){showToast('❌ Enter a valid amount');return;}
  S.engGoal = Number(a);
  await saveS(); closeM(); renderTab(); showToast('💍 Engagement budget set!');
}
async function addTask(){
  const title=document.getElementById('t-title').value.trim();
  const category=document.getElementById('t-cat').value;
  const event=document.getElementById('t-event').value;
  const dueDate=document.getElementById('t-due').value||'';
  if(!title){showToast('❌ Enter a task name');return;}
  S.tasks.push({id:uid(),title,category,event,dueDate,done:false});
  await saveS(); closeM(); renderTab(); showToast('✅ Task added!');
}
async function addVendor(){
  const name=document.getElementById('v-name').value.trim();
  const category=document.getElementById('v-cat').value;
  const phone=document.getElementById('v-phone').value.trim();
  const totalAmount=parseFloat(document.getElementById('v-total').value)||0;
  const paidAmount=parseFloat(document.getElementById('v-paid').value)||0;
  const status=document.getElementById('v-status').value;
  const notes=document.getElementById('v-notes').value.trim();
  if(!name){showToast('❌ Enter vendor name');return;}
  S.vendors.push({id:uid(),name,category,phone,totalAmount,paidAmount,status,notes});
  await saveS(); closeM(); renderTab(); showToast('🤝 Vendor added!');
}
async function saveVendor(id){
  const v=S.vendors.find(v=>v.id===id); if(!v) return;
  v.name=document.getElementById('v-name').value.trim();
  v.category=document.getElementById('v-cat').value;
  v.phone=document.getElementById('v-phone').value.trim();
  v.totalAmount=parseFloat(document.getElementById('v-total').value)||0;
  v.paidAmount=parseFloat(document.getElementById('v-paid').value)||0;
  v.status=document.getElementById('v-status').value;
  v.notes=document.getElementById('v-notes').value.trim();
  await saveS(); closeM(); renderTab(); showToast('✅ Vendor updated!');
}
async function addCustomCat(){
  const name=document.getElementById('nc-name').value.trim();
  if(!name){showToast('❌ Enter a category name');return;}
  const id='custom_'+uid();
  S.customCats.push({id,name,emoji:newCatEmoji,color:newCatColor,custom:true});
  await saveS(); closeM(); renderSettings(); showToast('✅ Category added!');
}
async function saveSheetsUrl(){
  const url=document.getElementById('sh-url').value.trim();
  if(!url||!url.startsWith('https://')){showToast('❌ Enter a valid URL');return;}
  S.sheetsUrl=url; await saveS(); closeM(); renderSettings();
  await syncToSheets();
}
async function importJSON(evt){
  const file = evt.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(e){
    try {
      const imported = JSON.parse(e.target.result);
      if(!imported.savings && !imported.expenses) { showToast('❌ Invalid backup file'); return; }
      if(!confirm(`Import ${(imported.savings||[]).length} savings + ${(imported.expenses||[]).length} expenses? Current data will be replaced.`)) return;
      S = {...S, ...imported};
      await saveS(); renderTab();
      showToast('✅ Data imported successfully!');
    } catch(err) { showToast('❌ Could not read file'); }
  };
  reader.readAsText(file);
  evt.target.value = '';
}
async function removeSheetsUrl(){
  S.sheetsUrl=''; S.lastSync=null; await saveS(); closeM(); renderSettings();
  showToast('Google Sheets disconnected');
}
async function delSaving(id){
  if(!confirm('Delete this savings entry?')) return;
  S.savings=S.savings.filter(s=>s.id!==id); await saveS(); renderTab();
}
async function delExpense(id){
  if(!confirm('Delete this expense?')) return;
  const exp=S.expenses.find(e=>e.id===id);
  // Reverse vendor paidAmount if linked
  if(exp?.vendorId){
    const v=S.vendors.find(v=>v.id===exp.vendorId);
    if(v){
      v.paidAmount=Math.max(0,(v.paidAmount||0)-exp.amount);
      if(v.paidAmount===0 && v.status==='paid') v.status='advance';
    }
  }
  S.expenses=S.expenses.filter(e=>e.id!==id);
  await saveS(); renderTab();
}

// ── Init ───────────────────────────────────────────────
async function init(){
  await loadS();

  // Add default tasks if none
  if(!S.tasks.length){
    S.tasks=DEFAULT_TASKS.map(t=>({...t,id:uid(),date:new Date().toISOString()}));
    await saveS();
  }

  applyTheme(S.theme);
  updateCDs(); setInterval(updateCDs,60000);
  updateSyncIcon();
  renderTab();
}
init();
