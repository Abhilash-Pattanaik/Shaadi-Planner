@media(prefers-color-scheme:dark){html:not([data-theme="light"]){

}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{background:var(--bg);height:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
/* Fill safe-area below tab bar with same surface color — kills the black strip */
body::before{content:'';position:fixed;bottom:0;left:0;right:0;height:calc(env(safe-area-inset-bottom,0px) + 58px);background:var(--sur);z-index:98;pointer-events:none;}
@media(min-width:900px){body::before{display:none;}}

.serif{font-family:'Playfair Display',serif;}

/* ── Mobile layout (default) ── */
.app-shell{max-width:480px;margin:0 auto;position:relative;}

/* Header */
.hdr{background:var(--sur);padding:12px 16px 10px;border-bottom:0.5px solid var(--bor);position:sticky;top:0;z-index:100;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;}
.hdr-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);}
.hdr-act{display:flex;gap:8px;flex-shrink:0;margin-left:auto;}
.icon-btn{background:var(--sur2);border:0.5px solid var(--bor);border-radius:var(--rs);width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;user-select:none;}
.cd-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.cd-pill{background:var(--gold-l);color:var(--gold-d);font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;}

/* Tab bar — mobile bottom */
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--sur);border-top:0.5px solid var(--bor);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0);box-shadow:0 -2px 12px rgba(0,0,0,0.06);}
/* Fix extra black space below tab bar on some devices */
.tb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 0 7px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:9px;font-family:'DM Sans',sans-serif;transition:color 0.2s;}

/* ── Desktop layout (≥900px) ── */
@media(min-width:900px){

  /* Header spans full width */
  .hdr{grid-column:1/-1;grid-row:1;position:sticky;top:0;z-index:100;padding:12px 24px 10px;display:flex;align-items:center;justify-content:space-between;}

  .hdr-title{font-size:22px;}
  .cd-row{margin-top:0;flex-wrap:nowrap;}

  .hdr>.cd-row{display:none;}

  #cd-mob{display:none !important;}

  /* Sidebar — left column */
  .tab-bar{position:static !important;transform:none !important;width:auto;max-width:none;flex-direction:column;border-top:none;border-right:0.5px solid var(--bor);grid-column:1;grid-row:2;padding:16px 0;height:100%;overflow-y:auto;align-items:stretch;bottom:auto !important;}
  .tb{flex:none;flex-direction:row;justify-content:flex-start;padding:11px 20px;font-size:13px;gap:12px;border-radius:0;}
  .tb.active{color:var(--gold);background:var(--gold-l);}
  .tb:hover:not(.active){background:var(--sur2);}
  .ti{font-size:20px;margin-bottom:0;}

  /* Main content — right column */
  .pages-wrap{grid-column:2;grid-row:2;overflow-y:auto;height:100%;}
  .pg{padding:24px 28px 40px;display:none;}
  .pg.active{display:block;}

  /* FAB — bottom right of content area */
  .fab{position:fixed;bottom:28px;right:28px;width:54px;height:54px;}

  /* Toast */
  .toast{bottom:40px;}

  /* Hide mobile-only elements */
  #cd-mob{display:none !important;}
  .mbd{align-items:center;}
  .modal{border-radius:16px;max-width:600px;max-height:85vh;}

  /* Dashboard 2-col grid */
  .desk-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start;}
  .desk-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .desk-span2{grid-column:1/-1;}

  .sg{grid-template-columns:repeat(4,1fr);}

  /* Wider charts */
  .chart-wrap.h200{height:240px;}
  .chart-wrap.h180{height:200px;}
  .chart-wrap.h160{height:180px;}

  /* Export grid 3-col */
  .exp-grid{grid-template-columns:repeat(3,1fr);}

  /* Sidebar label under app name */
.desk-sidebar-footer{display:none;}
@media(min-width:900px){

}

.btn{width:100%;padding:12px;background:var(--gold);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;}

<script>

// keep backward-compat references

// ── State ──────────────────────────────────────────────
let S = {
  goal:0, engGoal:0,
  weddingDate:'2026-12-02', engagementDate:'2026-07-01',

  sheetsUrl:'', lastSync:null,

};

// ── Storage (localStorage — works in any browser) ──────
async function loadS() {
  try {
    const r = localStorage.getItem('shaadi_v3');
    if(r) {
      const parsed = JSON.parse(r);
      S = {...S, ...parsed};
      // Always ensure numeric types
      S.goal    = Number(S.goal)    || 0;
      S.engGoal = Number(S.engGoal) || 0;
    }
  } catch(e) { console.warn('loadS error:', e); }
}
async function saveS() {
  try {
    // Ensure goal is stored as number before saving
    S.goal    = Number(S.goal)    || 0;
    S.engGoal = Number(S.engGoal) || 0;
    localStorage.setItem('shaadi_v3', JSON.stringify(S));
    updateNotifBadge();
  } catch(e) { console.warn('saveS error:', e); }
}

// ── Helpers ────────────────────────────────────────────
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
function allCats() { return [...DEFAULT_CATS,...S.customCats]; }
function getCat(id) { return allCats().find(c=>c.id===id)||DEFAULT_CATS[DEFAULT_CATS.length-1]; }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function daysLeft(d) { return Math.max(0,Math.ceil((d-new Date())/86400000)); }
function fmtDate(d) {
  if(!d) return '';
  const dt=new Date(d);
  if(isNaN(dt.getTime())) return '';
  return dt.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
}
function cleanMonth(m) {
  if(!m) return '';
  if(/^[A-Za-z]+ \d{4}$/.test(String(m).trim())) return String(m).trim();
  const dt=new Date(m);
  if(!isNaN(dt.getTime())) return MONTHS[dt.getMonth()]+' '+dt.getFullYear();
  return String(m);
}
function fmt(n) { return '₹'+Math.round(n).toLocaleString('en-IN'); }

function showToast(msg,ms=2500) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),ms);
}

// ── Theme ──────────────────────────────────────────────
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme',t||'auto');
  const icons={light:'☀️',dark:'🌙',auto:'✨'};
  document.getElementById('theme-btn').textContent = icons[t||'auto'];
}
function cycleTheme() {
  const order=['auto','light','dark'];
  S.theme=order[(order.indexOf(S.theme||'auto')+1)%3];
  applyTheme(S.theme); saveS();
  // Re-render current tab so gauge chart picks up new theme colors
  renderTab();
}

// ── Countdowns ─────────────────────────────────────────
function updateCDs() {
  const wTxt = `💒 Wedding: ${daysLeft(getWeddingDate())} days`;
  const eTxt = `💍 Engagement: ~${daysLeft(getEngagementDate())} days`;
  // Mobile pills
  const cw = document.getElementById('cd-w'); if(cw) cw.textContent = wTxt;
  const ce = document.getElementById('cd-e'); if(ce) ce.textContent = eTxt;
  // Desktop pills
  const cwd = document.getElementById('cd-w-d'); if(cwd) cwd.textContent = wTxt;
  const ced = document.getElementById('cd-e-d'); if(ced) ced.textContent = eTxt;
}

// ── Sync ───────────────────────────────────────────────
let syncStatus='idle';
function updateSyncIcon() {
  const icons={idle:'☁️',syncing:'🔄',synced:'✅',error:'⚠️'};
  document.getElementById('sync-ic').textContent=icons[syncStatus]||'☁️';
}
async function syncToSheets(silent=false) {
  if(!S.sheetsUrl){if(!silent){showToast('⚙️ Set up Sheets URL in Settings');goTab('settings');}return;}
  syncStatus='syncing'; updateSyncIcon();
  if(!silent) showToast('☁️ Syncing...');
  try {
    const payload = JSON.stringify({
      goal:S.goal, engGoal:S.engGoal,
      weddingDate:S.weddingDate, engagementDate:S.engagementDate,
      customCats:S.customCats,
      savings:S.savings, expenses:S.expenses,
      vendors:S.vendors, tasks:S.tasks, guests:S.guests,
      exportedAt:new Date().toISOString()
    });
    // Use no-cors POST with URLSearchParams — works in sandboxed iframes
    const body = new URLSearchParams();
    body.set('data', payload);
    const resp = await fetch(S.sheetsUrl, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: body.toString()
    });
    // no-cors always returns opaque — reaching here means network succeeded
    syncStatus='synced'; S.lastSync=new Date().toISOString(); await saveS();
    if(!silent) showToast('✅ Synced to Google Sheets!');
    if(curTab==='settings') renderSettings();
  } catch(err) {
    // Fallback: open URL in hidden iframe (works even when fetch is blocked)
    try {
      const payload = encodeURIComponent(JSON.stringify({
        goal:S.goal, engGoal:S.engGoal,
        savings:S.savings.slice(-50), expenses:S.expenses.slice(-100),
        exportedAt:new Date().toISOString()
      }));
      const url = S.sheetsUrl + '?data=' + payload;
      const ifr = document.createElement('iframe');
      ifr.style.display='none'; ifr.src=url;
      document.body.appendChild(ifr);
      setTimeout(()=>{ try{document.body.removeChild(ifr);}catch(e){} }, 5000);
      syncStatus='synced'; S.lastSync=new Date().toISOString(); await saveS();
      if(!silent) showToast('✅ Synced! Verify in your Sheet.');
      if(curTab==='settings') renderSettings();
    } catch(err2) {
      syncStatus='error';
      if(!silent) showToast('❌ Sync blocked by browser. Download CSV instead.');
    }
  }
  updateSyncIcon();
}
async function manualSync() { if(!S.sheetsUrl){goTab('settings');return;} await syncToSheets(); }

async function pullFromSheets(silent=false) {
  if(!S.sheetsUrl){showToast('⚙️ Set up Sheets URL in Settings');goTab('settings');return;}
  if(!silent) showToast('☁️ Pulling data from Sheets...');
  try {
    const url = S.sheetsUrl + '?action=pull';
    const resp = await fetch(url);
    if(!resp.ok) throw new Error('fetch failed');
    const data = await resp.json();
    if(!data || (!data.savings && !data.expenses)) throw new Error('empty');

    // Merge — sheet is source of truth
    if(data.savings)  S.savings  = data.savings.map(s=>({...s, month: cleanMonth(s.month)}));
    if(data.expenses) S.expenses = data.expenses;
    if(data.vendors)  S.vendors  = data.vendors;
    if(data.tasks)    S.tasks    = data.tasks;
    if(data.guests)   S.guests   = data.guests;
    if(data.customCats) S.customCats = data.customCats;
    if(data.goal     !== undefined) S.goal    = Number(data.goal)    || 0;
    if(data.engGoal  !== undefined) S.engGoal = Number(data.engGoal) || 0;
    if(data.weddingDate)    S.weddingDate    = data.weddingDate;
    if(data.engagementDate) S.engagementDate = data.engagementDate;

    await saveS();
    if(!silent) showToast('✅ Data pulled from Google Sheets!');
    renderTab();
    if(curTab==='settings') renderSettings();
  } catch(e) {
    if(!silent) showToast('❌ Pull failed. Check Apps Script code.');
  }
}

// ── Export ─────────────────────────────────────────────
function exportCSV(type) {
  let csv='',fn='';
  if(type==='savings'){
    csv='Month,Amount (INR),Note,Date\n';
    S.savings.forEach(s=>{csv+=`"${s.month||''}",${s.amount},"${s.note||''}","${fmtDate(s.date)}"\n`;});
    fn='shaadi_savings.csv';
  } else if(type==='expenses'){
    csv='Category,Amount (INR),Description,Event,Date\n';
    S.expenses.forEach(e=>{csv+=`"${getCat(e.category).name}",${e.amount},"${e.description||''}","${e.event||'wedding'}","${fmtDate(e.date)}"\n`;});
    fn='shaadi_expenses.csv';
  } else if(type==='vendors'){
    csv='Name,Phone,Category,Total Amount,Paid Amount,Status,Notes\n';
    S.vendors.forEach(v=>{csv+=`"${v.name}","${v.phone||''}","${getCat(v.category).name}",${v.totalAmount||0},${v.paidAmount||0},"${v.status}","${v.notes||''}"
`;});
    fn='shaadi_vendors.csv';
  } else if(type==='tasks'){
    csv='Task,Category,Event,Due Date,Done\n';
    S.tasks.forEach(t=>{csv+=`"${t.title}","${t.category}","${t.event}","${t.dueDate||''}","${t.done?'Yes':'No'}"\n`;});
    fn='shaadi_tasks.csv';
  } else if(type==='guests'){
    csv='Name,Event,No. of People,Invite Sent\n';
    S.guests.forEach(g=>{csv+=`"${g.name}","${g.event}",${g.count||1},"${g.invited?'Yes':'No'}"\n`;});
    fn='shaadi_guests.csv';
  } else {
    csv='Type,Details,Amount,Date\n';
    S.savings.forEach(s=>{csv+=`"Savings","${s.month||''}",${s.amount},"${fmtDate(s.date)}"\n`;});
    S.expenses.forEach(e=>{csv+=`"Expense","${getCat(e.category).name} - ${e.description||''}",${e.amount},"${fmtDate(e.date)}"\n`;});
    fn='shaadi_all.csv';
  }
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=fn; a.click(); showToast('📥 Downloaded!');
}
function exportJSON() {
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(S,null,2)],{type:'application/json'}));
  a.download='shaadi_backup.json'; a.click(); showToast('📦 Backup downloaded!');
}

// ── Tab ────────────────────────────────────────────────
let curTab='home';
function goTab(tab) {

// ── Charts ─────────────────────────────────────────────
const charts={};
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function getCSSVar(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}

function renderStackedBarChart(canvasId, labels, wData, eData) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId); if (!ctx) return;
  const tc   = getCSSVar('--text2')  || '#555';
  const gold = getCSSVar('--gold')   || '#8B5CF6';
  const red  = getCSSVar('--red')    || '#C026D3';
  charts[canvasId] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '💒 Wedding',    data: wData, backgroundColor: gold + 'CC', borderRadius: 0, stack: 'cat' },
        { label: '💍 Engagement', data: eData, backgroundColor: red  + 'CC', borderRadius: 4,  stack: 'cat' }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { font: { size: 11, family: 'DM Sans' }, color: tc, boxWidth: 12, padding: 12 } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ₹${Math.round(ctx.raw).toLocaleString('en-IN')}` } }
      },
      scales: {
        x: { stacked: true, grid: { display: false }, ticks: { font: { size: 11 }, color: tc } },
        y: { stacked: true, grid: { color: getCSSVar('--bor') }, ticks: { font: { size: 10 }, color: tc, callback: v => '₹' + Math.round(v/1000) + 'k' } }
      }
    }
  });
}

function renderPieChart(canvasId,labels,data,colors){
  destroyChart(canvasId);
  const ctx=document.getElementById(canvasId); if(!ctx||!data.length) return;
  charts[canvasId]=new Chart(ctx,{
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:getCSSVar('--sur')||'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'65%',
      plugins:{legend:{position:'right',labels:{font:{size:10,family:'DM Sans'},color:getCSSVar('--text')||'#222',boxWidth:10,padding:8}}}}
  });
}
function renderBarChart(canvasId,labels,data){
  destroyChart(canvasId);
  const ctx=document.getElementById(canvasId); if(!ctx) return;
  const gold=getCSSVar('--gold')||'#8B5CF6';
  const tc=getCSSVar('--text2')||'#555';
  charts[canvasId]=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[{data,backgroundColor:gold+'88',borderColor:gold,borderWidth:1,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{display:false},ticks:{font:{size:10},color:tc}},
        y:{grid:{color:getCSSVar('--bor')},ticks:{font:{size:10},color:tc,callback:v=>'₹'+Math.round(v/1000)+'k'}}
      }}
  });
}

// ── Charts helpers ────────────────────────────────────
function renderLineChart(canvasId, labels, datasets) {

function renderHBarChart(canvasId, labels, data, colors) {
  destroyChart(canvasId);

  const tc = getCSSVar('--text2') || '#555';
  charts[canvasId] = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderRadius: 4, borderSkipped: false }] },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: getCSSVar('--bor') }, ticks: { font: { size: 10 }, color: tc, callback: v => '₹' + Math.round(v / 1000) + 'k' } },
        y: { grid: { display: false }, ticks: { font: { size: 11 }, color: tc } }
      }
    }
  });
}

function renderGaugeChart(canvasId, value, max, label) {
  // Use SVG gauge — more reliable than Chart.js plugin
  const el = document.getElementById(canvasId);
  if (!el) return;
  const pct  = max > 0 ? Math.min(1, value / max) : 0;
  const pctTxt = (pct * 100).toFixed(0) + '%';
  const R = 90, cx = 120, cy = 110;
  const startAngle = Math.PI;
  const endAngle   = 2 * Math.PI;
  const sweepAngle = startAngle + pct * Math.PI;
  const x1 = cx + R * Math.cos(startAngle), y1 = cy + R * Math.sin(startAngle);
  const x2 = cx + R * Math.cos(endAngle),   y2 = cy + R * Math.sin(endAngle);
  const x3 = cx + R * Math.cos(sweepAngle), y3 = cy + R * Math.sin(sweepAngle);
  const largeArc = pct > 0.5 ? 1 : 0;
  const gold  = getComputedStyle(document.documentElement).getPropertyValue('--gold').trim() || '#8B5CF6';
  const bor   = getComputedStyle(document.documentElement).getPropertyValue('--bor').trim()  || 'rgba(124,58,237,0.12)';
  const text  = getComputedStyle(document.documentElement).getPropertyValue('--text').trim() || '#1E1B2E';
  const text3 = getComputedStyle(document.documentElement).getPropertyValue('--text3').trim()|| '#9B8EC4';
  el.innerHTML = `<svg viewBox="0 0 240 130" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
    <path d="M${x1},${y1} A${R},${R} 0 1,1 ${x2},${y2}" fill="none" stroke="${bor}" stroke-width="16" stroke-linecap="round"/>
    ${pct > 0 ? `<path d="M${x1},${y1} A${R},${R} 0 ${largeArc},1 ${x3},${y3}" fill="none" stroke="${gold}" stroke-width="16" stroke-linecap="round"/>` : ''}
    <text x="${cx}" y="${cy - 8}" text-anchor="middle" font-family="Playfair Display,Georgia,serif" font-size="26" font-weight="500" fill="${text}">${label}</text>
    <text x="${cx}" y="${cy + 14}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="13" fill="${gold}" font-weight="500">${pctTxt} of goal</text>
    <text x="${cx}" y="${cy + 30}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="${text3}">Goal: ${fmt(max)}</text>
  </svg>`;
}

// ── Home / Dashboard ───────────────────────────────────
function renderHome() {
  const wd = getWeddingDate(), ed = getEngagementDate();
  const totalSaved = S.savings.reduce((a, x) => a + x.amount, 0);
  const wExp = S.expenses.filter(e => e.event !== 'engagement');
  const eExp = S.expenses.filter(e => e.event === 'engagement');
  const wSpent = wExp.reduce((a, x) => a + x.amount, 0);
  const eSpent = eExp.reduce((a, x) => a + x.amount, 0);
  const totalSpent = wSpent + eSpent;
  const balance = totalSaved - totalSpent;
  const goal    = Number(S.goal)    || 0;
  const engGoal = Number(S.engGoal) || 0;
  const progress = goal > 0 ? Math.min(100, (totalSaved / goal) * 100) : 0;
  const spendPct  = goal > 0 ? Math.min(100, (wSpent / goal) * 100) : 0;

  const isDesktop = window.innerWidth >= 900;

  // ① Expense by Category — stacked column (desktop) / donut (mobile)
  const catTotals = {}, catWedding = {}, catEngagement = {};
  S.expenses.forEach(e => {
    catTotals[e.category]    = (catTotals[e.category]    || 0) + e.amount;
    if(e.event === 'engagement') catEngagement[e.category] = (catEngagement[e.category] || 0) + e.amount;
    else catWedding[e.category] = (catWedding[e.category] || 0) + e.amount;
  });
  const catE = Object.entries(catTotals).sort((a, b) => b[1] - a[1]).slice(0, 12);
  const pieLabels = catE.map(([id]) => getCat(id).emoji + ' ' + getCat(id).name);
  const pieData   = catE.map(([, v]) => v);
  const pieColors = catE.map(([id]) => getCat(id).color);

  const stackWedding    = catE.map(([id]) => catWedding[id]    || 0);
  const stackEngagement = catE.map(([id]) => catEngagement[id] || 0);

  // ② Monthly savings — bar
  const mMap = {};
  S.savings.forEach(s => { const m = cleanMonth(s.month) || fmtDate(s.date); mMap[m] = (mMap[m] || 0) + s.amount; });
  const mE = Object.entries(mMap).slice(-8);
  const barLabels = mE.map(([k]) => k.split(' ')[0].slice(0, 3));
  const barData   = mE.map(([, v]) => v);

  // ③ Savings by source — donut
  const srcTotals = {};
  S.savings.forEach(s => { const src = s.source || 'savings'; srcTotals[src] = (srcTotals[src] || 0) + s.amount; });
  const srcE = Object.entries(srcTotals);
  const srcLabels = srcE.map(([id]) => { const s = SAVINGS_SOURCES.find(x => x.id === id); return s ? s.emoji + ' ' + s.name : id; });
  const srcData   = srcE.map(([, v]) => v);
  const srcColors = ['#7C3AED','#A855F7','#6D28D9','#C026D3','#9333EA'];

  const allDates = [...S.savings.map(s => {
    const monthLabel = cleanMonth(s.month) || fmtDate(s.date);
    // For sorting, derive a sortable date from month (first of month)
    let sortDate = s.date;
    if(s.month) {
      const parts = String(s.month).trim().split(' ');
      if(parts.length === 2) {
        const mon = new Date(`${parts[0]} 1, ${parts[1]}`);

  ];

              <div style="height:8px;background:var(--sur3);border-radius:4px;overflow:hidden"><div style="height:100%;width:${((tasksDone/tasksTotal)*100).toFixed(0)}%;background:var(--green);border-radius:4px;transition:width 0.6s"></div></div>
            </div>
            <button class="btn-sm sec" onclick="goTab('tasks')" style="font-size:11px">View</button>

    <div class="desk-summary-row">
      ${engGoal ? `<div class="card" style="border-color:var(--gold)">

      </div>` : '<div></div>'}
      ${goal ? `<div class="card">
        <div class="card-t">💒 Marriage Summary</div>
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
          <div class="big-n serif" style="font-size:22px">${fmt(wSpent)}</div>
          <div style="font-size:12px;color:var(--text3)">of ${fmt(goal)}</div>
        </div>
        <div class="pb" style="margin-top:0"><div class="pf" style="width:${spendPct.toFixed(0)}%;background:var(--red)"></div></div>

let taskFilter='all', taskSearch=''; // all | wedding | engagement | done

    <div class="tog-opt ${taskFilter==='wedding'?'active':''}" onclick="setTaskF('wedding')">💒 Wedding</div>
    <div class="tog-opt ${taskFilter==='engagement'?'active':''}" onclick="setTaskF('engagement')">💍 Engagement</div>
    <div class="tog-opt ${taskFilter==='done'?'active':''}" onclick="setTaskF('done')">✅ Done</div>
  </div>`;

  const pending=S.tasks.filter(t=>!t.done).length;
  const done=S.tasks.filter(t=>t.done).length;
  const isDesktop = window.innerWidth >= 900;

  document.getElementById('pg-tasks').innerHTML=`
    <div class="sg">
      <div class="sc"><div class="sl">Remaining</div><div class="sv r">${pending}</div></div>
      <div class="sc"><div class="sl">Completed</div><div class="sv g">${done}</div></div>
    </div>

    <input class="search-bar" type="text" id="task-search-input" placeholder="Search tasks..." value="${taskSearch.replace(/"/g,'&quot;')}" oninput="filterTasks(this.value)" style="margin-bottom:10px">

  renderTaskList();

  const inp=document.getElementById('task-search-input');
  if(inp&&taskSearch){inp.focus();const l=inp.value.length;inp.setSelectionRange(l,l);}
}

function renderTaskList() {
  let tasks=S.tasks;
  if(taskFilter==='done') tasks=tasks.filter(t=>t.done);
  else if(taskFilter!=='all') tasks=tasks.filter(t=>t.event===taskFilter&&!t.done);
  else tasks=tasks.filter(t=>!t.done);
  if(taskSearch.trim()) tasks=tasks.filter(t=>t.title.toLowerCase().includes(taskSearch.toLowerCase())||t.category.toLowerCase().includes(taskSearch.toLowerCase()));

  const isDesktop = window.innerWidth >= 900;
  const wrap = document.getElementById('task-list-wrap');
  if(!wrap) return;

  const items = isDesktop ?
    `<div class="dt-wrap"><table class="dt">
      <thead><tr><th style="width:32px"></th><th>Task</th><th>Category</th><th>Event</th><th>Due Date</th><th style="width:40px"></th></tr></thead>
      <tbody>${tasks.map(t=>`<tr>
        <td><div class="task-cb ${t.done?'done':''}" onclick="toggleTask('${t.id}')" style="margin:0">${t.done?'✓':''}</div></td>
        <td style="${t.done?'text-decoration:line-through;color:var(--text3)':''}">${t.title}</td>
        <td><span style="color:var(--text3);font-size:12px">${t.category}</span></td>
        <td><span class="badge ${t.event==='engagement'?'o':'b'}">${t.event==='engagement'?'💍 Engagement':'💒 Wedding'}</span></td>
        <td style="color:var(--text3);font-size:12px">${t.dueDate?fmtDate(t.dueDate):'—'}</td>
        <td style="white-space:nowrap"><button class="btn-sm sec" onclick="openEditTaskModal('${t.id}')" style="font-size:11px;margin-right:4px">Edit</button><button class="btn-ic" onclick="delTask('${t.id}')">✕</button></td>
      </tr>`).join('')||`<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text3)">No tasks found.</td></tr>`}
      </tbody></table></div>`
    :
    `<div class="card"><div class="card-t">${taskFilter==='done'?'Completed':'Pending'} Tasks (${tasks.length})</div>${
      tasks.map(t=>`<div class="task-item">
        <div class="task-cb ${t.done?'done':''}" onclick="toggleTask('${t.id}')">${t.done?'✓':''}</div>
        <div class="task-info">
          <div class="task-title ${t.done?'done':''}">${t.title}</div>
          <div class="task-meta">
            <span>${t.category}</span>
            <span class="badge ${t.event==='engagement'?'o':'b'}">${t.event==='engagement'?'💍 Engagement':'💒 Wedding'}</span>
            ${t.dueDate?`<span>📅 ${fmtDate(t.dueDate)}</span>`:''}
          </div>
        </div>
        <button class="btn-sm sec" onclick="openEditTaskModal('${t.id}')" style="font-size:11px">Edit</button><button class="btn-ic" onclick="delTask('${t.id}')">✕</button>
      </div>`).join('') || '<div class="empty"><div class="empty-ic">🎉</div>No tasks found.</div>'
    }</div>`;

  wrap.innerHTML = items;
}

function filterTasks(val){ taskSearch=val; renderTaskList(); }
function setTaskF(f){ taskFilter=f; taskSearch=''; renderTasks(); }
async function toggleTask(id){
  if(IS_READONLY){showToast('👁️ View-only mode');return;}
  const t=S.tasks.find(t=>t.id===id); if(!t) return;
  t.done=!t.done; await saveS(); renderTaskList();
  if(t.done) showToast('✅ Task marked complete!');
}
async function delTask(id){
  if(!confirm('Delete this task?')) return;
  S.tasks=S.tasks.filter(t=>t.id!==id); await saveS(); renderTaskList();
}

let guestEvFilter='wedding', guestSearch='';

function renderGuests() {
  const wGuests=S.guests.filter(g=>g.event==='wedding');
  const eGuests=S.guests.filter(g=>g.event==='engagement');
  const bGuests=S.guests.filter(g=>g.event==='barajaatri');
  const wTotal=wGuests.reduce((a,g)=>a+(g.count||1),0);
  const eTotal=eGuests.reduce((a,g)=>a+(g.count||1),0);
  const bTotal=bGuests.reduce((a,g)=>a+(g.count||1),0);
  const wInvited=wGuests.filter(g=>g.invited).reduce((a,g)=>a+(g.count||1),0);
  const eInvited=eGuests.filter(g=>g.invited).reduce((a,g)=>a+(g.count||1),0);
  const bInvited=bGuests.filter(g=>g.invited).reduce((a,g)=>a+(g.count||1),0);

  const pending=S.guests.filter(g=>g.event===guestEvFilter&&!g.invited).length;
  const invitedCount=(guestEvFilter==='wedding'?wInvited:guestEvFilter==='engagement'?eInvited:bInvited);

  document.getElementById('pg-guests').innerHTML=`
    <div class="sg">
      <div class="sc"><div class="sl">💒 Wedding Guests</div><div class="sv o">${wTotal} people</div></div>
      <div class="sc"><div class="sl">💍 Engagement Guests</div><div class="sv o">${eTotal} people</div></div>
      <div class="sc"><div class="sl">🎺 Barajaatri Guests</div><div class="sv o">${bTotal} people</div></div>
      <div class="sc"><div class="sl">Invites Sent</div><div class="sv g">${invitedCount}</div></div>
      <div class="sc"><div class="sl">Invite Pending</div><div class="sv r">${pending}</div></div>
    </div>
    <div class="tog-wrap">
      <div class="tog-opt ${guestEvFilter==='wedding'?'active':''}" onclick="setGuestEv('wedding')">💒 Wedding</div>
      <div class="tog-opt ${guestEvFilter==='engagement'?'active':''}" onclick="setGuestEv('engagement')">💍 Engagement</div>
      <div class="tog-opt ${guestEvFilter==='barajaatri'?'active':''}" onclick="setGuestEv('barajaatri')">🎺 Barajaatri</div>
    </div>
    <input class="search-bar" type="text" id="guest-search-input" placeholder="Search guest name..." value="${guestSearch.replace(/"/g,'&quot;')}" oninput="filterGuests(this.value)">
    <div id="guest-list-wrap"></div>`;

  renderGuestList();

  // Restore focus and cursor position if search was active
  const inp = document.getElementById('guest-search-input');
  if(inp && guestSearch) {
    inp.focus();
    const len = inp.value.length;
    inp.setSelectionRange(len, len);
  }
}

function renderGuestList() {
  let list = S.guests.filter(g=>g.event===guestEvFilter);
  if(guestSearch.trim()) list=list.filter(g=>g.name.toLowerCase().includes(guestSearch.toLowerCase()));
  list=[...list].sort((a,b)=>a.name.localeCompare(b.name));

  const total=list.reduce((a,g)=>a+(g.count||1),0);
  const invited=list.filter(g=>g.invited).reduce((a,g)=>a+(g.count||1),0);
  const isDesktop=window.innerWidth>=900;

  const wrap = document.getElementById('guest-list-wrap');
  if(!wrap) return;

  if(isDesktop){
    const rows=list.map(g=>{
      const initials=g.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
      return `<tr>
        <td><div style="display:flex;align-items:center;gap:10px"><div class="guest-avatar" style="width:30px;height:30px;font-size:11px;flex-shrink:0">${initials}</div>${g.name}</div></td>
        <td style="text-align:center">${g.count||1}</td>
        <td><span class="invite-badge ${g.invited?'invite-yes':'invite-no'}" onclick="toggleInvite('${g.id}')" style="cursor:pointer">${g.invited?'✓ Invited':'Pending'}</span></td>
        <td style="white-space:nowrap"><button class="btn-sm sec" onclick="openEditGuestModal('${g.id}')" style="font-size:11px;margin-right:4px">Edit</button><button class="btn-ic" onclick="delGuest('${g.id}')">✕</button></td>
      </tr>`;}).join('');
    wrap.innerHTML=`<div class="dt-wrap"><table class="dt">
      <thead><tr><th>Guest Name</th><th style="text-align:center">People</th><th>Invite Status</th><th></th></tr></thead>
      <tbody>${rows||`<tr><td colspan="4" style="text-align:center;padding:32px;color:var(--text3)">No guests yet. Click + to add.</td></tr>`}</tbody>
    </table></div>
    <div style="font-size:12px;color:var(--text3);margin-top:6px">${total} people · ${invited} invited · ${total-invited} pending</div>`;
  } else {
    const items=list.map(g=>{
      const initials=g.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
      return `<div class="guest-item">
        <div class="guest-avatar">${initials}</div>
        <div class="guest-info">
          <div class="guest-name">${g.name}</div>
          <div class="guest-meta">
            <span class="invite-badge ${g.invited?'invite-yes':'invite-no'}" onclick="toggleInvite('${g.id}')">${g.invited?'✓ Invited':'Invite Pending'}</span>
            <span style="color:var(--text3)">👥 ${g.count||1} ${(g.count||1)===1?'person':'people'}</span>
          </div>
        </div>
        <button class="btn-sm sec" onclick="openEditGuestModal('${g.id}')" style="font-size:11px">Edit</button><button class="btn-ic" onclick="delGuest('${g.id}')">✕</button>
      </div>`;}).join('');
    wrap.innerHTML=`<div class="card">
      <div class="card-t">${guestEvFilter==='wedding'?'💒 Wedding':guestEvFilter==='engagement'?'💍 Engagement':'🎺 Barajaatri'} · ${total} people · ${invited} invited</div>
      ${items||'<div class="empty"><div class="empty-ic">👥</div>No guests yet.<br>Tap + to add guests.</div>'}
    </div>`;
  }
}

function filterGuests(val){
  guestSearch=val;
  renderGuestList();  // only update list, search bar stays intact
}

async function toggleInvite(id){
  if(IS_READONLY){showToast('👁️ View-only mode');return;}
  const g=S.guests.find(g=>g.id===id); if(!g) return;
  g.invited=!g.invited; await saveS(); renderGuestList();
  showToast(g.invited?'✉️ Marked as invited!':'Invite marked pending');
}
async function delGuest(id){
  if(!confirm('Remove this guest?')) return;
  S.guests=S.guests.filter(g=>g.id!==id); await saveS(); renderGuestList();
}

function doGet(e){
  if(e.parameter.action==='pull'){
    var ss=SpreadsheetApp.getActiveSpreadsheet();

    function sheetToObjects(sheetName,keys){
      var sh=ss.getSheetByName(sheetName);
      if(!sh||sh.getLastRow()<2) return [];
      var rows=sh.getRange(2,1,sh.getLastRow()-1,keys.length).getValues();
      return rows.filter(function(r){return r[0]!=='';}).map(function(r){
        var obj={};
        keys.forEach(function(k,i){obj[k]=r[i]||'';});
        return obj;
      });
    }

    var savings=sheetToObjects('Savings',['month','source','amount','note','date']);
    savings=savings.map(function(r){r.amount=parseFloat(r.amount)||0;r.id=r.id||Date.now().toString(36)+Math.random().toString(36).slice(2,5);return r;});

    var expenses=sheetToObjects('Expenses',['category','amount','description','event','date']);
    expenses=expenses.map(function(r){r.amount=parseFloat(r.amount)||0;r.id=r.id||Date.now().toString(36)+Math.random().toString(36).slice(2,5);return r;});

    var vendors=sheetToObjects('Vendors',['name','category','phone','totalAmount','paidAmount','balance','status','notes']);
    vendors=vendors.map(function(r){r.totalAmount=parseFloat(r.totalAmount)||0;r.paidAmount=parseFloat(r.paidAmount)||0;r.id=r.id||Date.now().toString(36)+Math.random().toString(36).slice(2,5);return r;});

    var tasks=sheetToObjects('Tasks',['title','category','event','dueDate','done']);
    tasks=tasks.map(function(r){r.done=(r.done==='Yes'||r.done===true);r.id=r.id||Date.now().toString(36)+Math.random().toString(36).slice(2,5);return r;});

    var guests=sheetToObjects('Guests',['name','event','count','invited']);
    guests=guests.map(function(r){r.count=parseInt(r.count)||1;r.invited=(r.invited==='Yes'||r.invited===true);r.id=r.id||Date.now().toString(36)+Math.random().toString(36).slice(2,5);return r;});

    var goal=0,engGoal=0,weddingDate='',engagementDate='',customCats=[];
    var cfg=ss.getSheetByName('Config');
    if(cfg&&cfg.getLastRow()>1){
      var cfgData=cfg.getRange(2,1,cfg.getLastRow()-1,2).getValues();
      cfgData.forEach(function(row){
        if(row[0]==='goal')            goal=parseFloat(row[1])||0;
        if(row[0]==='engGoal')         engGoal=parseFloat(row[1])||0;
        if(row[0]==='weddingDate')     weddingDate=row[1]||'';
        if(row[0]==='engagementDate')  engagementDate=row[1]||'';
        if(row[0]==='customCats'){     try{customCats=JSON.parse(row[1])||[];}catch(e){} }
      });
    }

    var result=JSON.stringify({
      goal:goal,
      engGoal:engGoal,
      weddingDate:weddingDate,
      engagementDate:engagementDate,
      customCats:customCats,
      savings:savings,
      expenses:expenses,
      vendors:vendors,
      tasks:tasks,
      guests:guests
    });
    return ContentService.createTextOutput(result).setMimeType(ContentService.MimeType.JSON);
  }
  return ContentService.createTextOutput('ok');
}`;

function openM(html){
  document.getElementById('mc').innerHTML=html;
  const bd=document.getElementById('modal');
  bd.classList.add('open');

  // Swipe down to close
  const m=bd.querySelector('.modal');
  let startY=0, startT=0;
  m._onTouchStart=function(e){
    startY=e.touches[0].clientY;
    startT=Date.now();
    m.style.transition='none';
  };
  m._onTouchMove=function(e){
    const dy=e.touches[0].clientY-startY;
    if(dy>0){ m.style.transform=`translateY(${dy}px)`; }
  };
  m._onTouchEnd=function(e){
    const dy=e.changedTouches[0].clientY-startY;
    const dt=Date.now()-startT;
    m.style.transition='';
    m.style.transform='';
    // Close if swiped down >80px OR fast flick >40px in <300ms
    if(dy>80||(dy>40&&dt<300)){ closeM(); }
  };
  m.removeEventListener('touchstart',m._onTouchStart);
  m.removeEventListener('touchmove',m._onTouchMove);
  m.removeEventListener('touchend',m._onTouchEnd);
  m.addEventListener('touchstart',m._onTouchStart,{passive:true});
  m.addEventListener('touchmove',m._onTouchMove,{passive:true});
  m.addEventListener('touchend',m._onTouchEnd,{passive:true});
}
function closeM(){
  const bd=document.getElementById('modal');
  bd.classList.remove('open');
  const m=bd.querySelector('.modal');
  m.style.transform='';
  m.style.transition='';
}
function mClickOut(e){ if(e.target.id==='modal') closeM(); }

async function saveEditExpense(id){
  if(IS_READONLY){showToast('👁️ View-only mode');return;}
  const e = S.expenses.find(e => e.id === id); if(!e) return;
  const oldAmount   = e.amount;
  const oldVendorId = e.vendorId;
  // Reverse old vendor paidAmount
  if(oldVendorId){
    const ov = S.vendors.find(v => v.id === oldVendorId);
    if(ov) ov.paidAmount = Math.max(0, (ov.paidAmount||0) - oldAmount);
  }
  e.category    = document.getElementById('e-cat').value;
  e.event       = document.getElementById('e-event').value;
  e.amount      = parseFloat(document.getElementById('e-amt').value)||0;
  e.vendorId    = document.getElementById('e-vendor').value||'';
  e.description = document.getElementById('e-desc').value.trim();
  e.date        = document.getElementById('e-date').value;
  // Apply new vendor paidAmount
  if(e.vendorId){
    const nv = S.vendors.find(v => v.id === e.vendorId);
    if(nv){
      nv.paidAmount = (nv.paidAmount||0) + e.amount;
      if(nv.paidAmount >= (nv.totalAmount||0) && nv.status !== 'paid') nv.status = 'paid';
    }
  }
  await saveS(); closeM(); renderTab(); showToast('✅ Expense updated!');
}

async function addSaving(){
  const month=document.getElementById('s-month').value;
  const source=document.getElementById('s-src').value;
  const amount=parseFloat(document.getElementById('s-amt').value);
  const note=document.getElementById('s-note').value.trim();
  if(!amount||amount<=0){showToast('❌ Enter a valid amount');return;}
  S.savings.push({id:uid(),date:new Date().toISOString(),month,source,amount,note});
  await saveS(); closeM(); renderTab();
  showToast('✅ Savings added!');
  if(S.sheetsUrl) syncToSheets(true);
}
async function addExpense(){
  const category=document.getElementById('e-cat').value;
  const event=document.getElementById('e-event').value;
  const amount=parseFloat(document.getElementById('e-amt').value);
  const vendorId=document.getElementById('e-vendor').value||'';
  const description=document.getElementById('e-desc').value.trim();
  const date=document.getElementById('e-date').value||new Date().toISOString().split('T')[0];
  if(!amount||amount<=0){showToast('❌ Enter a valid amount');return;}

  // Auto-fill description from vendor name if empty
  let desc=description;
  if(!desc && vendorId){
    const v=S.vendors.find(v=>v.id===vendorId);
    if(v) desc=v.name;
  }

  S.expenses.push({id:uid(),date,category,event,amount,description:desc,vendorId});

  // Update vendor paidAmount if linked
  if(vendorId){
    const v=S.vendors.find(v=>v.id===vendorId);
    if(v){
      v.paidAmount=(v.paidAmount||0)+amount;
      if(v.paidAmount>=(v.totalAmount||0) && v.status!=='paid') v.status='paid';
      else if(v.paidAmount>0 && v.status==='shortlisted') v.status='advance';
    }
  }

  await saveS(); closeM(); renderTab();
  showToast(vendorId?'✅ Expense added & vendor updated!':'✅ Expense added!');
  if(S.sheetsUrl) syncToSheets(true);
}

async function importJSON(evt){
  const file = evt.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(e){
    try {
      const imported = JSON.parse(e.target.result);
      if(!imported.savings && !imported.expenses) { showToast('❌ Invalid backup file'); return; }
      if(!confirm(`Import ${(imported.savings||[]).length} savings + ${(imported.expenses||[]).length} expenses? Current data will be replaced.`)) return;
      S = {...S, ...imported};
      await saveS(); renderTab();
      showToast('✅ Data imported successfully!');
    } catch(err) { showToast('❌ Could not read file'); }
  };
  reader.readAsText(file);
  evt.target.value = '';
}
async function removeSheetsUrl(){
  S.sheetsUrl=''; S.lastSync=null; await saveS(); closeM(); renderSettings();
  showToast('Google Sheets disconnected');
}
async function delSaving(id){
  if(!confirm('Delete this savings entry?')) return;
  S.savings=S.savings.filter(s=>s.id!==id); await saveS(); renderTab();
}
async function delExpense(id){
  if(!confirm('Delete this expense?')) return;
  const exp=S.expenses.find(e=>e.id===id);
  // Reverse vendor paidAmount if linked
  if(exp?.vendorId){
    const v=S.vendors.find(v=>v.id===exp.vendorId);
    if(v){
      v.paidAmount=Math.max(0,(v.paidAmount||0)-exp.amount);
      if(v.paidAmount===0 && v.status==='paid') v.status='advance';
    }
  }
  S.expenses=S.expenses.filter(e=>e.id!==id);
  await saveS(); renderTab();
}

// ── Notification service ───────────────────────────────

function getUpcomingTasks() {
  const now   = new Date(); now.setHours(0,0,0,0);
  const week  = new Date(now); week.setDate(now.getDate() + 7);
  const tasks = S.tasks.filter(t => !t.done && t.dueDate);
  return tasks.map(t => {
    const due = new Date(t.dueDate); due.setHours(0,0,0,0);
    const diff = Math.round((due - now) / 86400000);
    let urgency = 'week';
    if (diff < 0)        urgency = 'overdue';
    else if (diff <= 1)  urgency = 'today';
    else if (diff <= 7)  urgency = 'week';
    return { ...t, diff, urgency, due };
  }).filter(t => t.diff <= 7)
    .sort((a, b) => a.diff - b.diff);
}

function updateNotifBadge() {
  const count = getUpcomingTasks().length;
  const badge = document.getElementById('notif-badge');
  if (!badge) return;
  if (count > 0) {
    badge.textContent = count > 9 ? '9+' : count;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

let notifOpen = false;
function toggleNotifPanel() {
  notifOpen = !notifOpen;
  renderNotifPanel();
  const panel = document.getElementById('notif-panel');
  if (panel) panel.classList.toggle('open', notifOpen);
  // Close on outside click
  if (notifOpen) {
    setTimeout(() => {
      document.addEventListener('click', closeNotifOnOutside, { once: true });
    }, 10);
  }
}

function closeNotifOnOutside(e) {
  const panel = document.getElementById('notif-panel');
  const btn   = document.getElementById('notif-btn');
  if (panel && !panel.contains(e.target) && btn && !btn.contains(e.target)) {
    notifOpen = false;
    panel.classList.remove('open');
  }
}

function renderNotifPanel() {
  const panel = document.getElementById('notif-panel');
  if (!panel) return;
  const tasks = getUpcomingTasks();

  const itemsHTML = tasks.length === 0
    ? `<div class="notif-empty">🎉<br>No upcoming tasks this week!<br><span style="font-size:11px">All caught up</span></div>`
    : tasks.map(t => {
        const dueLabel = t.diff < 0    ? `Overdue by ${Math.abs(t.diff)} day${Math.abs(t.diff)!==1?'s':''}` :
                         t.diff === 0  ? 'Due today' :
                         t.diff === 1  ? 'Due tomorrow' :
                         `Due in ${t.diff} days · ${fmtDate(t.dueDate)}`;
        const eventBadge = t.event === 'engagement' ? '💍' : '💒';
        return `<div class="notif-item ${t.urgency}">
          <div class="notif-dot ${t.urgency}"></div>
          <div class="notif-body">
            <div class="notif-title">${t.title}</div>
            <div class="notif-sub">${eventBadge} ${t.category} · ${dueLabel}</div>
          </div>
          ${!IS_READONLY ? `<button class="notif-done-btn" onclick="notifMarkDone('${t.id}')">✓ Done</button>` : ''}
        </div>`;
      }).join('');

  panel.innerHTML = `
    <div class="notif-hdr">
      <div class="notif-hdr-t">🔔 Upcoming Tasks</div>
      <div style="font-size:11px;color:var(--text3)">${tasks.length} this week</div>
    </div>
    ${itemsHTML}
    ${tasks.length > 0 ? `<div style="padding:10px 14px;border-top:0.5px solid var(--bor)"><button class="btn-sm sec" style="width:100%" onclick="goTab('tasks');toggleNotifPanel()">View All Tasks →</button></div>` : ''}
  `;
}

async function notifMarkDone(id) {
  const t = S.tasks.find(t => t.id === id); if (!t) return;
  t.done = true;
  await saveS();
  updateNotifBadge();
  renderNotifPanel();
  showToast('✅ Task marked complete!');
  if (curTab === 'tasks') renderTaskList();
}

  const sheetsParam = S.sheetsUrl ? '&sheets=' + encodeURIComponent(S.sheetsUrl) : '';
  const link = base + '?readonly=1' + sheetsParam;
  navigator.clipboard.writeText(link)
    .then(()  => showToast('🔗 Read-only link copied!'))
    .catch(()  => { prompt('Copy this link:', link); });
}

function downloadReadonlyHTML() {
  const seedScript = `\n<script>\n(function(){\n  try{\n    var _d=${JSON.stringify(S).replace(/<\/script>/gi,'<\\/script>')};\n    localStorage.setItem('shaadi_v3', JSON.stringify(_d));\n  }catch(e){}\n  window.__FORCE_READONLY = true;\n})();\n<\/script>\n`;
  let out = document.documentElement.outerHTML;
  out = out.replace('<head>', '<head>' + seedScript);
  out = out.replace(
    "const IS_READONLY = new URLSearchParams(window.location.search).get('readonly') === '1'",
    "const IS_READONLY = window.__FORCE_READONLY || new URLSearchParams(window.location.search).get('readonly') === '1'"
  );
  const blob = new Blob([out], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'shaadi_planner_readonly.html';
  a.click();
  showToast('📤 Read-only file downloaded! Share this file.');
}

// ── Init ───────────────────────────────────────────────
async function init(){
  await loadS();
  // Desktop: show inline countdown, hide mobile row; inject sidebar footer
  if(window.innerWidth>=900){
    const deskPills = document.getElementById('cd-desk');
    if(deskPills) deskPills.style.display='flex';
    const mobRow = document.getElementById('cd-mob');
    if(mobRow) mobRow.style.display='none';
    const footer=document.createElement('div');
    footer.className='desk-sidebar-footer';
    footer.textContent='Shaadi Planner · 2 Dec 2026';
    document.getElementById('tab-bar').appendChild(footer);
  }

  // Add default tasks if none
  if(!S.tasks.length){
    S.tasks=DEFAULT_TASKS.map(t=>({...t,id:uid(),date:new Date().toISOString()}));
    await saveS();
  }

  applyTheme(S.theme);
  updateCDs(); setInterval(updateCDs,60000);
  updateSyncIcon();
  applyReadonlyMode();
  updateNotifBadge();

  // ── Readonly mode: auto-pull from Sheets ──────────────
  if(IS_READONLY){
    // 1. Try URL param first (?sheets=...)
    const urlSheets = new URLSearchParams(window.location.search).get('sheets');
    if(urlSheets && !S.sheetsUrl) S.sheetsUrl = decodeURIComponent(urlSheets);

    if(S.sheetsUrl){
      // Show loading overlay
      document.body.insertAdjacentHTML('beforeend',
        `<div id="ro-loader" style="position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px">
          <div style="font-size:36px">💍</div>
          <div style="font-family:'Playfair Display',serif;font-size:18px;color:var(--gold)">Loading Shaadi Planner…</div>
          <div style="font-size:13px;color:var(--text3)">Fetching latest data</div>
        </div>`);
      try {
        const resp = await fetch(S.sheetsUrl + '?action=pull');
        if(!resp.ok) throw new Error('http '+resp.status);
        const data = await resp.json();
        if(!data) throw new Error('empty response');
        if(data.savings)     S.savings     = data.savings.map(s=>({...s,month:cleanMonth(s.month)}));
        if(data.expenses)    S.expenses    = data.expenses;
        if(data.vendors)     S.vendors     = data.vendors;
        if(data.tasks)       S.tasks       = data.tasks;
        if(data.guests)      S.guests      = data.guests;
        if(data.customCats)  S.customCats  = data.customCats;
        if(data.goal     !== undefined) S.goal    = Number(data.goal)    || 0;
        if(data.engGoal  !== undefined) S.engGoal = Number(data.engGoal) || 0;
        if(data.weddingDate)    S.weddingDate    = data.weddingDate;
        if(data.engagementDate) S.engagementDate = data.engagementDate;
        localStorage.setItem('shaadi_v3', JSON.stringify(S));
      } catch(err) {
        console.error('Readonly pull failed:', err);
        showToast('⚠️ Could not fetch latest data — showing last cached version');
      }
      const loader = document.getElementById('ro-loader');
      if(loader) loader.remove();
    } else {
      // No sheets URL at all — show one-time setup prompt
      const entered = prompt('Enter your Google Sheets App URL to load data:');
      if(entered && entered.startsWith('https://')){
        S.sheetsUrl = entered.trim();
        localStorage.setItem('shaadi_v3', JSON.stringify(S));
        location.reload();
        return;
      } else {
        showToast('⚠️ No data source — showing empty planner');
      }
    }
  }

  renderTab();
}
init();
</script>
